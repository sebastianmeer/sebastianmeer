name: generate galaga contribution graph

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Collect contribution data
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('node:fs');
            const path = require('node:path');

            const query = `
              query($login: String!) {
                user(login: $login) {
                  contributionsCollection {
                    contributionCalendar {
                      totalContributions
                      weeks {
                        contributionDays {
                          date
                          contributionCount
                        }
                      }
                    }
                  }
                }
              }
            `;

            const data = await github.graphql(query, {
              login: context.repo.owner,
            });

            const calendar = data.user.contributionsCollection.contributionCalendar;
            const outputPath = path.join(process.cwd(), 'dist', 'galaga-data.json');
            fs.mkdirSync(path.dirname(outputPath), { recursive: true });
            fs.writeFileSync(
              outputPath,
              JSON.stringify(
                {
                  totalContributions: calendar.totalContributions,
                  weeks: calendar.weeks,
                },
                null,
                2
              )
            );

      - name: Render Galaga SVGs
        run: node scripts/generate-galaga-svg.mjs

      - name: Remove temp data
        run: rm -f dist/galaga-data.json

      - name: Push SVGs to output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
